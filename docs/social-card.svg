<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Arrow markers for etcd raft connections -->
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c03030"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#c03030"/>
    </marker>
    <marker id="arr-d" markerWidth="6" markerHeight="8" refX="3" refY="7" orient="auto">
      <polygon points="0 0, 6 0, 3 8" fill="#4a7ab5"/>
    </marker>
  </defs>

  <!-- ── Background ─────────────────────────────────────────── -->
  <rect width="1280" height="640" fill="#0d1117"/>

  <!-- Subtle top gradient band -->
  <rect width="1280" height="4" fill="#1f6feb" opacity="0.8"/>

  <!-- ── Title block ─────────────────────────────────────────── -->
  <text x="640" y="52" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Consolas, monospace"
        font-size="34" font-weight="700" fill="#e6edf3"
        letter-spacing="-0.5">Talos Linux on Apple's container runtime</text>

  <text x="640" y="82" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="17" fill="#7d8590" letter-spacing="0.3">
    one micro-VM per node  ·  HA etcd quorum  ·  macOS 26+  ·  Apple Silicon
  </text>

  <!-- Divider line -->
  <line x1="80" y1="97" x2="1200" y2="97" stroke="#21262d" stroke-width="1"/>

  <!-- ── macOS host outer box ────────────────────────────────── -->
  <rect x="22" y="108" width="1236" height="490" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="36" y="126" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="12" fill="#6e7681">macOS 26+  ·  Apple Silicon host</text>

  <!-- ── apple/container runtime box ───────────────────────── -->
  <rect x="50" y="133" width="1180" height="453" rx="6"
        fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="640" y="153" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="13" font-weight="600" fill="#388bfd">
    apple/container runtime  (vmnet · per-VM DHCP)
  </text>

  <!-- Stable endpoint note -->
  <text x="640" y="176" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="11" fill="#6e7681">
    Stable endpoint: talos-cluster.local  →  container system dns  (FQDN survives DHCP IP churn)
  </text>

  <!-- ── Control Plane section box ─────────────────────────── -->
  <rect x="80" y="188" width="1120" height="205" rx="5"
        fill="#0f1b2d" stroke="#1f6feb" stroke-width="1"
        stroke-dasharray="5,3"/>
  <text x="640" y="206" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="12" fill="#388bfd">Control Plane  ·  embedded etcd quorum</text>

  <!-- CP Node 1 -->
  <rect x="108" y="215" width="288" height="165" rx="5"
        fill="#0d1b2e" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="252" y="237" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="14" font-weight="700" fill="#e6edf3">talos-cp-1</text>
  <text x="252" y="256" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="12" fill="#7d8590">192.168.x.a</text>
  <text x="252" y="272" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" fill="#6e7681">micro-VM</text>
  <!-- etcd box inside CP1 -->
  <rect x="130" y="285" width="244" height="80" rx="4"
        fill="#1a0808" stroke="#c03030" stroke-width="1.5"/>
  <text x="252" y="311" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="13" font-weight="700" fill="#ef5350">etcd</text>
  <text x="252" y="330" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" fill="#c03030">raft consensus</text>
  <text x="252" y="358" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="10" fill="#6e7681">member 1 / 3</text>

  <!-- CP Node 2 (centered) -->
  <rect x="496" y="215" width="288" height="165" rx="5"
        fill="#0d1b2e" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="640" y="237" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="14" font-weight="700" fill="#e6edf3">talos-cp-2</text>
  <text x="640" y="256" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="12" fill="#7d8590">192.168.x.b</text>
  <text x="640" y="272" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" fill="#6e7681">micro-VM</text>
  <!-- etcd box inside CP2 -->
  <rect x="518" y="285" width="244" height="80" rx="4"
        fill="#1a0808" stroke="#c03030" stroke-width="1.5"/>
  <text x="640" y="311" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="13" font-weight="700" fill="#ef5350">etcd</text>
  <text x="640" y="330" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" fill="#c03030">raft consensus</text>
  <text x="640" y="358" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="10" fill="#6e7681">member 2 / 3</text>

  <!-- CP Node 3 -->
  <rect x="884" y="215" width="288" height="165" rx="5"
        fill="#0d1b2e" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="1028" y="237" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="14" font-weight="700" fill="#e6edf3">talos-cp-3</text>
  <text x="1028" y="256" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="12" fill="#7d8590">192.168.x.c</text>
  <text x="1028" y="272" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" fill="#6e7681">micro-VM</text>
  <!-- etcd box inside CP3 -->
  <rect x="906" y="285" width="244" height="80" rx="4"
        fill="#1a0808" stroke="#c03030" stroke-width="1.5"/>
  <text x="1028" y="311" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="13" font-weight="700" fill="#ef5350">etcd</text>
  <text x="1028" y="330" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" fill="#c03030">raft consensus</text>
  <text x="1028" y="358" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="10" fill="#6e7681">member 3 / 3</text>

  <!-- etcd raft arrows (bidirectional) -->
  <!-- CP1 ↔ CP2 -->
  <line x1="374" y1="325" x2="518" y2="325"
        stroke="#c03030" stroke-width="1.5"
        marker-end="url(#arr-r)" marker-start="url(#arr-l)"/>
  <!-- CP2 ↔ CP3 -->
  <line x1="762" y1="325" x2="906" y2="325"
        stroke="#c03030" stroke-width="1.5"
        marker-end="url(#arr-r)" marker-start="url(#arr-l)"/>

  <!-- ── Worker Nodes section box ──────────────────────────── -->
  <rect x="80" y="408" width="1120" height="120" rx="5"
        fill="#0a1628" stroke="#2ea043" stroke-width="1"
        stroke-dasharray="5,3"/>
  <text x="640" y="425" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="12" fill="#2ea043">Worker Nodes</text>

  <!-- Worker 1 -->
  <rect x="108" y="432" width="240" height="82" rx="5"
        fill="#0a1f12" stroke="#2ea043" stroke-width="1.5"/>
  <text x="228" y="454" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="13" font-weight="700" fill="#e6edf3">worker-1</text>
  <text x="228" y="472" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="11" fill="#7d8590">192.168.x.d</text>
  <text x="228" y="489" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" fill="#6e7681">micro-VM</text>

  <!-- Worker 2 (centered) -->
  <rect x="520" y="432" width="240" height="82" rx="5"
        fill="#0a1f12" stroke="#2ea043" stroke-width="1.5"/>
  <text x="640" y="454" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="13" font-weight="700" fill="#e6edf3">worker-2</text>
  <text x="640" y="472" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="11" fill="#7d8590">192.168.x.e</text>
  <text x="640" y="489" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" fill="#6e7681">micro-VM</text>

  <!-- Ellipsis between workers -->
  <text x="807" y="481" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="22" fill="#6e7681">···</text>

  <!-- Worker N -->
  <rect x="932" y="432" width="240" height="82" rx="5"
        fill="#0a1f12" stroke="#2ea043" stroke-width="1.5"/>
  <text x="1052" y="454" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="13" font-weight="700" fill="#e6edf3">worker-N</text>
  <text x="1052" y="472" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="11" fill="#7d8590">192.168.x.f</text>
  <text x="1052" y="489" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" fill="#6e7681">micro-VM</text>

  <!-- ── Bottom annotation bar ──────────────────────────────── -->
  <line x1="80" y1="543" x2="1200" y2="543" stroke="#21262d" stroke-width="1"/>

  <!-- Left annotation: Named volumes -->
  <rect x="80" y="550" width="14" height="14" rx="2" fill="#1f6feb" opacity="0.8"/>
  <text x="101" y="562"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="12" fill="#8b949e">
    <tspan font-weight="600" fill="#e6edf3">Named volumes</tspan>
    <tspan>  block-backed ext4 · state persists across restarts even as DHCP IP shifts</tspan>
  </text>

  <!-- Right annotation: MetalLB -->
  <rect x="80" y="571" width="14" height="14" rx="2" fill="#2ea043" opacity="0.8"/>
  <text x="101" y="583"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="12" fill="#8b949e">
    <tspan font-weight="600" fill="#e6edf3">MetalLB L2 VIP</tspan>
    <tspan>  host-reachable on apple/container · gratuitous ARP works on vmnet (contrast: qemu path drops it)</tspan>
  </text>

  <!-- Bottom brand line -->
  <text x="1200" y="583" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="10" fill="#30363d">
    aegis-apple-container-provisioner-talos
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="636" width="1280" height="4" fill="#1f6feb" opacity="0.5"/>
</svg>
